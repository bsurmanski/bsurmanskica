{{ define "main" }}
<div class="container" style="padding-top: 20px;">
    <div class="row">
        <div class="col-lg-12">
            <h2>{{ .Title }}</h2>
            <p>{{ .Description }}</p>
            <hr>
        </div>
    </div>

    <div class="row">
        {{ range .Site.Data.games }}
            {{ partial "game-card.html" . }}
        {{ end }}
    </div>
</div>
{{ end }}
